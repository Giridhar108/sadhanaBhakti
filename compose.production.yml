x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app
    logging: *default-logging

  api:
    build:
      context: ./backend
      args:
        DOCKER_REGISTRY: "${DOCKER_REGISTRY:-dockerhub.timeweb.cloud/library}"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      FRONTEND_URL: "${FRONTEND_URL:?FRONTEND_URL is required}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}"
      AUDIO_UPLOAD_DIR: /app/uploads/audio
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - audio_uploads:/app/uploads
    networks:
      - app
    stop_grace_period: 20s
    logging: *default-logging

  web:
    build:
      context: .
      args:
        DOCKER_REGISTRY: "${DOCKER_REGISTRY:-dockerhub.timeweb.cloud/library}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-8080}:80"
    networks:
      - app
    logging: *default-logging

networks:
  app:

volumes:
  postgres_data:
  audio_uploads:
