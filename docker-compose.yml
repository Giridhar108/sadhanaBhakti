services:
  postgres:
    image: postgres:16-alpine
    container_name: hare-krishna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hare_krishna
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hare-krishna-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
